services:
  - type: web
    name: creator-dashboard
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev --ignore-scripts
    startCommand: node server.js
    envVars:
      - key: YOUTUBE_API_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: NODE_ENV
        value: production
